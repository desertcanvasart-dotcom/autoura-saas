[build]
# Ensure environment variables are available during build
# This allows Supabase clients to be initialized at module level

[deploy]
startCommand = "npm run start"

[[cron]]
schedule = "0 2 * * *"
command = "curl -s -X POST $APP_URL/api/cron/process-agent-memory -H 'x-cron-secret: $CRON_SECRET' || true"
